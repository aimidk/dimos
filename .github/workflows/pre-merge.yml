name: pre_merge

on:
  pull_request:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest_fast:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Ubuntu system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            g++ \
            portaudio19-dev \
            git-lfs \
            libturbojpeg \
            python3-dev \
            pre-commit

      - name: Follow Development Install and Test
        run: |

          SECONDS=0

          uv sync --extra base --extra dev --extra manipulation --extra misc --extra unitree --extra drone

          uv run pytest dimos/robot/test_all_blueprints_generation.py::test_all_blueprints_is_current

          # Run mypy check for multiple Python versions
          uv run mypy --python-version 3.10 dimos
          uv run mypy --python-version 3.12 dimos

          echo "# "
          echo "# "
          echo "# pytest fast"
          echo "# "
          echo "# "
          uv run bin/pytest-fast
          TEST_EXIT_CODE=$?

          echo ""
          echo "==================================="
          echo "Total test time: ${SECONDS}s"
          echo "==================================="

          exit $TEST_EXIT_CODE
